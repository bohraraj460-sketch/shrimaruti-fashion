<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMF Admin | Command Center</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="app-layout">
        
        <div class="sidebar-premium">
            <div class="sidebar-header-box">
                <div class="shop-avatar">SM</div>
                <div class="shop-meta"><h3>Admin Console</h3><p>Shri Maruti Fashion</p></div>
            </div>
          <div class="sidebar-navigation">
                <button class="menu-node active">📊 Dashboard</button>
                 <button class="menu-node" style="color:var(--text-gold); width:100%; margin-top: 10px;" onclick="window.open('index.html', '_blank')">👁️ Live Store</button>
                <button onclick="window.open('index.html?mode=edit', '_blank')" style="width: 100%; margin-top: 30px; background: linear-gradient(45deg, #ff3f6c, #ff9800); color: white; border: none; padding: 12px 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 63, 108, 0.4); display: flex; align-items: center; justify-content: center; gap: 10px;">
    🎨 Customize Site
</button>
                </button>
            </div>
        </div>

        <div class="main-viewport">
            <div class="top-nav-bar">
                <h1>Command Center</h1>
                <div style="color: #00c853; font-weight: bold; font-size: 12px;">● ONLINE</div>
            </div>

            <div class="content-body">
                <div class="metrics-grid">
                    <div class="metric-glass-card"><div class="card-meta">Total Sales</div><div class="value-display" style="color:var(--text-gold);">₹0</div></div>
                    <div class="metric-glass-card"><div class="card-meta">Live Products</div><div class="value-display" id="totalProducts">0</div></div>
                </div>

              
                <div class="premium-form-card">
                    <h3>Deploy New Item</h3>
                    <form id="addProductForm">
    <div class="input-group-premium"><label>Product Title</label><input type="text" id="prodTitle" required></div>
    <div class="input-group-premium"><label>Price (₹)</label><input type="number" id="prodPrice" required></div>
    <div class="input-group-premium"><label>Discount Tag (e.g. 30% OFF)</label><input type="text" id="prodDiscount" required></div>
    <div class="input-group-premium"><label>Full Description</label><textarea id="prodDesc" style="width:100%; padding:14px; background:#1a1a26; color:white; border-radius:8px;" required></textarea></div>
    
<input type="number" id="prodStock" class="form-input" placeholder="Total Stock Quantity (e.g., 50)" required style="margin-bottom: 10px;">

    <div class="input-group-premium">
        <label>Category</label>
        <select id="prodCategory" required style="width: 100%; padding: 14px; background: #1a1a26; border-radius: 8px; color: white;">
            <option value="Cosmetics">Cosmetics</option>
            <option value="Hosiery">Hosiery</option>
            <option value="Men">Men</option>
            <option value="Women">Women</option>
        </select>
    </div>
    
    <div class="input-group-premium">
        <label>Upload Photo</label>
        <input type="file" id="prodImage" accept="image/*" required style="color: white; padding: 10px; width: 100%;">
    </div>
    <button type="submit" class="btn-submit-product">Inject to Database</button>
</form>
</div>

            <div class="database-section-premium" style="margin-top: 30px;">
                    <h3>Live Database (Products)</h3>
                    <table class="master-data-table">
                        <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Action</th></tr></thead>
                        <tbody id="productTableBody"></tbody>
                    </table>
                </div>

                <div class="database-section-premium" style="margin-top: 30px;">
                    <h3>Customer Orders (Live Tracker)</h3>
                    <table class="master-data-table">
                        <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Update</th></tr></thead>
                        <tbody id="ordersTableBody"></tbody>
                    </table>
                </div>
        </div>
    </div>
    
    <script src="admin.js"></script>

    <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:5000; justify-content:center; align-items:center;">
        <div class="premium-form-card" style="width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; background:#12121a;">
            <h3 style="margin-bottom: 20px; border-left: 4px solid var(--text-gold); padding-left:10px;">Edit Product</h3>
            <form id="editProductForm">
                <input type="hidden" id="editProdId">
                <div class="input-group-premium"><label>Product Title</label><input type="text" id="editProdTitle" required></div>
                <div class="input-group-premium"><label>Price (₹)</label><input type="number" id="editProdPrice" required></div>
                <input type="number" id="editProdStock" class="form-input" placeholder="Update Stock Quantity" required style="margin-bottom: 10px;">
                <div class="input-group-premium"><label>Discount Tag</label><input type="text" id="editProdDiscount" required></div>
                <div class="input-group-premium"><label>Full Description</label><textarea id="editProdDesc" style="width:100%; padding:14px; background:#1a1a26; color:white; border-radius:8px;" required></textarea></div>
                
                <div class="input-group-premium">
                    <label>Category</label>
                    <select id="editProdCategory" style="width: 100%; padding: 14px; background: #1a1a26; border-radius: 8px; color: white;">
                        <option value="Cosmetics">Cosmetics</option>
                        <option value="Hosiery">Hosiery</option>
                        <option value="Men">Men</option>
                        <option value="Women">Women</option>
                    </select>
                </div>
                
                <div class="input-group-premium">
                    <label>Upload New Photo <span style="color:#888;">(Leave blank to keep old image)</span></label>
                    <input type="file" id="editProdImage" accept="image/*" style="color: white; padding: 10px; width: 100%;">
                </div>
                
            <button type="button" class="btn-submit-product" id="saveEditBtn" onclick="saveEditedProduct()" style="background:#00c853; color:white;">Save Updates</button>
                <button type="button" class="btn-submit-product" onclick="document.getElementById('editModal').style.display='none'" style="background:#333; color:white; margin-top:10px;">Cancel</button>
            </form>
        </div>
    </div>
</body>
</html>
